name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  scaffold-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace metadata
        run: pnpm install --lockfile=false
      - name: Print scaffold status
        run: |
          echo "tinyclaw scaffold is present"
          test -d apps/desktop
          test -d apps/api
